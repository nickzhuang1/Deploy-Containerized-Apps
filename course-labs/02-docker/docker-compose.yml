# ============================================================
# Docker Compose — Flask API
#
# 【單服務版（預設）】只跑 Flask，馬上能測試
# 用法：
#   docker compose up -d
#   curl http://localhost:5000/
#   docker compose down
#
# 【完整版 Flask + PostgreSQL】
#   docker compose -f docker-compose.full.yml up -d
# ============================================================

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
    restart: unless-stopped
