# /etc/network/interfaces — Proxmox 網路設定範本
# 修改後執行：systemctl restart networking
# 或直接在 Web UI > System > Network 設定

# ── Loopback ─────────────────────────────────────────────────────────────
auto lo
iface lo inet loopback

# ── 實體網卡（不直接設定 IP，橋接給 vmbr0 用）──────────────────────────
auto eno1
iface eno1 inet manual

# ── vmbr0：橋接模式（Bridge）──────────────────────────────────────────────
# VM 可直接取得與 Proxmox 同網段 IP，對外可見
auto vmbr0
iface vmbr0 inet static
    address  192.168.1.100/24    # Proxmox 管理 IP
    gateway  192.168.1.1
    dns-nameservers 8.8.8.8 1.1.1.1
    bridge-ports  eno1
    bridge-stp    off
    bridge-fd     0
    bridge-vlan-aware yes
# bridge-vlan-aware yes 可支援 VLAN Tag

# ── vmbr1（可選）：NAT 內部網路 ──────────────────────────────────────────
# VM 透過 Proxmox 做 NAT 上網，不對外暴露
