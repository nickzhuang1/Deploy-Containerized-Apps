# ============================================================
# HPA — 水平自動擴縮容
# 前提：已安裝 Metrics Server
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 40     # CPU 超過 40% 開始擴容
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80     # 記憶體超過 80% 也觸發擴容

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0      # 擴容不等待，立即反應
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15              # 每 15 秒最多加 2 個 Pod
    scaleDown:
      stabilizationWindowSeconds: 30     # 縮容冷卻 30 秒（預設 300，示範用縮短）
      policies:
        - type: Pods
          value: 1
          periodSeconds: 15              # 每 15 秒最多減 1 個 Pod

# ── 驗證指令 ─────────────────────────────────────────────────
# kubectl get hpa
# kubectl describe hpa web-app-hpa
#
# 套用後即時生效：
# kubectl apply -f hpa.yaml
# kubectl get hpa -w
