# ============================================================
# Service — ClusterIP（內部）+ NodePort（對外測試）
# 對應 deployment.yaml（nginx:1.25，port 80）
# ============================================================

# ── ClusterIP（預設，只在叢集內部存取）──────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-clusterip
spec:
  selector:
    app: web
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80

# ── NodePort（對外暴露，適合測試環境）─────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-nodeport
spec:
  selector:
    app: web
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080             # 30000–32767，不指定則隨機

# 取得 NodePort
# kubectl get svc web-app-nodeport -o jsonpath='{.spec.ports[0].nodePort}'
# 存取：http://<node-ip>:30080
