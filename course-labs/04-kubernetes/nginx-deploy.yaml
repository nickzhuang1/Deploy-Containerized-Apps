# ============================================================
# 完整範例：Nginx Deployment + NodePort Service
# 用法：
#   kubectl apply -f nginx-deploy.yaml
#   kubectl get pods -l app=nginx
#   kubectl get svc nginx-svc
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
spec:
  selector:
    app: nginx
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30088

# ── 驗證指令 ─────────────────────────────────────────────────
