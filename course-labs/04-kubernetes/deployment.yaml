# ============================================================
# 完整 Deployment 範本 — 課程示範用（使用 nginx:1.25）
# 展示：RollingUpdate / Resource Limits / Readiness + Liveness Probe
#
# 用法：
#   kubectl apply -f deployment.yaml
#   kubectl apply -f service.yaml
#   kubectl rollout status deployment/web-app
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: default
  labels:
    app: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0              # 零停機更新：保持所有舊 Pod Running 直到新的 Ready
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.25          # 直接用 nginx，不需要自建 image
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # Readiness Probe：回應 200 才接流量
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          # Liveness Probe：掛掉自動重啟
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
